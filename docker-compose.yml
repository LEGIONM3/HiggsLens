services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: higgslens-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./configs:/app/configs
    environment:
      - HIGGSLENS_DATA_DIR=/app/data
      - HIGGSLENS_ARTIFACTS_DIR=/app/artifacts
      - HIGGSLENS_CONFIG_DIR=/app/configs
      - HIGGSLENS_DEBUG=True
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: higgslens-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
