name: HiggsLens CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.11.19"
          python-version: "3.12"
      - name: Set up Python 3.12 environment
        run: |
          uv venv --python 3.12 .venv
          uv pip install -e backend/
      - name: Run Ruff Lint
        run: uv run --python 3.12 ruff check backend/app backend/tests scripts
      - name: Run Mypy Typecheck
        run: uv run --python 3.12 mypy backend/app backend/tests scripts
      - name: Run Pytest
        run: uv run --python 3.12 pytest -v backend/tests

  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Run TypeScript Typecheck
        working-directory: ./frontend
        run: npm run typecheck
      - name: Run Frontend Tests
        working-directory: ./frontend
        run: npm test
