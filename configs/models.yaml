models:
  dummy_prior:
    id: "dummy_prior"
    display_name: "Dummy Classifier (Prior)"
    required: true
    supports_missing: false
    preprocessing: "impute_median_scale"
    hyperparameters:
      strategy: "prior"
  logistic_regression:
    id: "logistic_regression"
    display_name: "Logistic Regression"
    required: true
    supports_missing: false
    preprocessing: "impute_median_scale"
    hyperparameters:
      C: 1.0
      max_iter: 1000
  random_forest:
    id: "random_forest"
    display_name: "Random Forest"
    required: true
    supports_missing: false
    preprocessing: "impute_median"
    hyperparameters:
      n_estimators: 100
      max_depth: 15
      n_jobs: -1
  histogram_gradient_boosting:
    id: "histogram_gradient_boosting"
    display_name: "Histogram Gradient Boosting"
    required: true
    supports_missing: true
    preprocessing: "native"
    hyperparameters:
      max_iter: 150
      max_depth: 10
  xgboost:
    id: "xgboost"
    display_name: "XGBoost Classifier"
    required: false
    supports_missing: true
    preprocessing: "native"
    hyperparameters:
      n_estimators: 150
      max_depth: 6
      learning_rate: 0.1
      n_jobs: 4
  mlp:
    id: "mlp"
    display_name: "Multi-Layer Perceptron (Small MLP)"
    required: false
    supports_missing: false
    preprocessing: "impute_median_scale"
    hyperparameters:
      hidden_layer_sizes: [64, 32]
      max_iter: 200
      alpha: 0.0001
